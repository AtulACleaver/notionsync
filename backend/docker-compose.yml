version: "3.9"
services:
  db:
    image: postgres:16
    container_name: notionsync-db
    environment:
      POSTGRES_USER: notionsync
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: notionsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: